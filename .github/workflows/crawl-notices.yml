name: Crawl Hansung notices

on:
  schedule:
    # KST Mon-Fri 09:00-17:00 == UTC Mon-Fri 00:00-08:00
    - cron: "0 0-8 * * 1-5"
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-crawl.txt

      - name: Install crawler dependencies
        run: python -m pip install -r requirements-crawl.txt

      - name: Validate Supabase secret
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::SUPABASE_DB_URL secret is empty or missing. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi
          if [[ "$SUPABASE_DB_URL" != postgresql://* && "$SUPABASE_DB_URL" != postgres://* ]]; then
            echo "::error::SUPABASE_DB_URL must start with postgresql:// or postgres://"
            exit 1
          fi
          echo "SUPABASE_DB_URL is configured."

      - name: Crawl and save to Supabase
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python crawling/auto_crawler.py --storage supabase --init-db --no-index --max-pages 5
